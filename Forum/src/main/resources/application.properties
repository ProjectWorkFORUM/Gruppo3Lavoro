spring.application.name=Forum
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/forum?serverTimezone=UTC
# esegue data.sql all'avvio, dopo che Hibernate ha creato/aggiornato le tabelle
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.datasource.username=root
spring.datasource.password=1234
# aumentiamo dimensioni file
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.format_sql=true 
