<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Risposte · Pugliamare Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/Css/base.css}">
<link rel="stylesheet" th:href="@{/Css/layout.css}">
<link rel="stylesheet" th:href="@{/Css/thread-page.css}">
</head>
<body>

<header th:replace="~{fragments/layout :: header('esperienze')}"></header>

<div class="page">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="/">Home</a>
    <span class="sep">›</span>
    <a class="exp" th:if="${thread.esperienza != null}"
       th:href="@{/esperienze/{id}/discussioni(id=${thread.esperienza.id})}"
       th:text="${thread.esperienza.titolo}">Esperienza</a>
    <span class="sep" th:if="${thread.esperienza != null}">›</span>
    <span class="current">Risposte</span>
  </div>

  <div class="eyebrow">DISCUSSIONE</div>
  <h1 class="title" th:text="${thread.titolo}">Titolo della discussione</h1>



  <!-- Lista risposte -->
  <div class="thread-list">
    <div class="thread" th:each="r : ${listaRisposte}">
      <div class="thread-head">
        <div class="thread-ava" style="background:#CE6F3D;"
             th:text="${r.utente != null ? r.utente.iniziali : 'PM'}">PM</div>
        <div style="flex:1;">
          <div class="thread-user" th:text="${r.titolo}">Titolo risposta</div>
          <div class="thread-time"
               th:text="(${r.utente != null ? r.utente.username : 'Utente'}) + ' · ' + ${r.data_creazione}">utente · data</div>
        </div>
      </div>
      <p class="thread-text" th:text="${r.testo}">Testo della risposta.</p>
    </div>

    <div class="thread thread-empty" th:if="${listaRisposte == null or #lists.isEmpty(listaRisposte)}">
      <p class="thread-text">Ancora nessuna risposta. Sii il primo a rispondere!</p>
    </div>

    <div class="thread-actions">
      <div th:if="${puoRispondere}">
        <a class="btn-primary" th:href="@{/Threads/{id}/Risposte/nuova(id=${thread.id})}">↩ Scrivi una risposta</a>
      </div>
      <div  th:if="${!puoRispondere}">
        Solo chi ha acquistato questa esperienza può rispondere.
        <a href="/login" th:if="${user == null}"><span style="color:blue;text-decoration: underline;">Accedi</span></a>
      </div>
    </div>
  </div>
</div>


<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
