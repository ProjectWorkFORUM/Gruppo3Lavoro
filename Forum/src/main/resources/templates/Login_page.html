<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  PUGLIAMARE FORUM · LOGIN
  Pagina standalone, pronta per Thymeleaf + Spring Boot.

  Per integrarla in Thymeleaf:
   1. Rinomina in  src/main/resources/templates/login.html
   2. Aggiungi il namespace:  <html lang="it" xmlns:th="http://www.thymeleaf.org">
   3. Sul <form> usa:  th:action="@{/login}" method="post"
      (Spring Security intercetta /login di default)
   4. CSRF: se usi Spring Security con Thymeleaf il token è
      iniettato in automatico; altrimenti aggiungi dentro il form:
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
   5. Messaggio di errore login:
      <div th:if="${param.error}" class="alert"> Credenziali non valide </div>
   6. I <input> hanno già name="username" / name="password"
      (i default attesi da Spring Security formLogin).
  ════════════════════════════════════════════════════════════════
-->
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Accedi · Pugliamare Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Mulish', -apple-system, sans-serif; background: #F5EFE2; color: #15323B; }
  ::selection { background: #CE6F3D; color: #fff; }
  input, button { font-family: inherit; }
  a { color: inherit; }
  @keyframes pmFade { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .auth { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }

  /* ── Left visual panel ── */
  .auth-visual {
    position: relative; padding: 48px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: #fff; background-color: #07323D;
    background:
      linear-gradient(180deg, rgba(7,50,61,.55), rgba(7,50,61,.82)),
      url('https://www.pugliamare.it/cdn/shop/files/Pugliamare_Cooking-Class_5_2.jpg?v=1776955365') center / cover no-repeat;
  }
  .brand { display: flex; align-items: center; gap: 11px; text-decoration: none; color: #fff; }
  .brand-icon {
    width: 42px; height: 42px; border-radius: 13px;
    background: rgba(255,255,255,.16); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit'; font-weight: 800; font-size: 22px;
  }
  .brand-name { font-family: 'Outfit'; font-weight: 800; font-size: 21px; }
  .brand-name span { font-weight: 500; opacity: .7; }
  .visual-copy h2 { font-family: 'Outfit'; font-weight: 800; font-size: 38px; line-height: 1.1; margin-bottom: 12px; }
  .visual-copy p  { font-size: 17px; opacity: .85; max-width: 420px; }

  /* ── Right form panel ── */
  .auth-form-wrap {
    display: flex; align-items: center; justify-content: center;
    padding: 48px; background: #F5EFE2;
  }
  .auth-form { width: 100%; max-width: 400px; animation: pmFade .45s ease both; }
  .auth-form h1 { font-family: 'Outfit'; font-weight: 800; font-size: 32px; color: #0C4A57; margin-bottom: 6px; }
  .auth-form .lead { color: #7C8C92; font-size: 15px; margin-bottom: 28px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-weight: 700; font-size: 14px; color: #15323B; margin-bottom: 7px; }
  .field input {
    width: 100%; border: 1.5px solid #E6DCCB; border-radius: 13px;
    padding: 14px 16px; font-size: 15px; color: #15323B;
    background: #fff; outline: none; transition: border-color .15s, box-shadow .15s;
  }
  .field input:focus { border-color: #1B8DA3; box-shadow: 0 0 0 3px rgba(27,141,163,.14); }

  .row-forgot { text-align: right; margin: -4px 0 20px; }
  .row-forgot a { color: #176B7E; font-weight: 700; font-size: 13.5px; text-decoration: none; }
  .row-forgot a:hover { text-decoration: underline; }

  .alert {
    background: #F6DAD0; color: #B2400F; border: 1px solid #EEC0B2;
    font-size: 13.5px; font-weight: 600; padding: 11px 14px;
    border-radius: 11px; margin-bottom: 18px;
  }

  .btn-submit {
    width: 100%; border: none; background: #CE6F3D; color: #fff;
    font-weight: 700; font-size: 16px; padding: 15px; border-radius: 13px;
    box-shadow: 0 6px 18px rgba(206,111,61,.3); transition: filter .15s; cursor: pointer;
  }
  .btn-submit:hover { filter: brightness(.93); }

  .switch { text-align: center; color: #7C8C92; font-size: 14px; margin-top: 22px; }
  .switch a { color: #0C4A57; font-weight: 800; text-decoration: none; }
  .switch a:hover { color: #CE6F3D; }

  @media (max-width: 860px) {
    .auth { grid-template-columns: 1fr; }
    .auth-visual { min-height: 240px; padding: 32px; }
    .visual-copy h2 { font-size: 26px; }
    .auth-form-wrap { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth">
  <!-- Visual side -->
  <div class="auth-visual">
    <a class="brand" href="/">
      <div class="brand-icon">P</div>
      <div class="brand-name">Pugliamare <span>Forum</span></div>
    </a>
    <div class="visual-copy">
      <h2>La community di chi ama la Puglia ti aspetta.</h2>
      <p>Accedi per pubblicare recensioni, salvare i posti del cuore e seguire i contributori local.</p>
    </div>
  </div>

  <!-- Form side -->
  <div class="auth-form-wrap">
    <form class="auth-form" th:action="@{/login}" th:object="${loginForm}" method="post">
      <h1>Bentornato </h1>
      <p class="lead">Accedi al tuo account Pugliamare.</p>


      <!--Alter usarname e password eorrati -->
      <div class="alert" th:if="${#fields.hasGlobalErrors()}"
           th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" th:field="*{username}" placeholder="Il tuo username" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="row-forgot">
        <a href="/password/recover">Password dimenticata?</a>
      </div>

      <!-- CSRF (Spring Security): decommentare in Thymeleaf
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      -->

      <button type="submit" class="btn-submit">Accedi</button>

      <div class="switch">
        Non hai un account? <a href="/register">Registrati</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
