<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard · Pugliamare Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/Css/base.css}">
  <link rel="stylesheet" th:href="@{/Css/layout.css}">
  <link rel="stylesheet" th:href="@{/Css/dashboard.css}">

</head>
<body>
<header th:replace="~{fragments/layout :: header('dashboard')}"></header>

<div class="page">
  <div class="head">
    <div>
      <div class="eyebrow">LA TUA DASHBOARD</div>
      <h1 th:text="${user != null ? 'Ciao ' + user.nome + ', ecco la tua Puglia' : 'Ciao, ecco la tua Puglia'}">Ciao Marco, ecco la tua Puglia</h1>
    </div>
    <a th:href="@{/profilo}"><button class="btn-primary" type="button">✎ Le tue recensioni</button></a>
  </div>

  <div class="tiles">
    <div class="tile"><div class="num" style="color:#1B8DA3;" th:text="${numAcquisti} ?: 0">20</div><div class="lbl">esperienze acquistate</div></div>
    <div class="tile"><div class="num" style="color:#E7A736;" th:text="${ultimeRecensioni != null ? #lists.size(ultimeRecensioni) : 0}">3</div><div class="lbl">recensioni scritte</div></div>
  </div>

  <div class="grid">
    <div class="map-card">
      <div class="map-head">
        <div class="t">Le tue esperienze in Puglia</div>
        <div class="legend">
          <span class="done">● Completate</span>
          <span class="todo">● Da vivere</span>
        </div>
      </div>
      <div class="map-wrap">
        <img th:src="@{/Img/mappa-puglia.png}" alt="Mappa della Puglia">

        <div class="pin" th:each="p : ${tappe}"
             th:style="'left:' + ${p.left} + ';top:' + ${p.top} + ';'"
             th:classappend="${p.completata} ? 'done' : 'todo'">
          <div class="tag" th:text="${p.nomeCitta}">Città</div>
          <div class="dot"></div>
        </div>
      </div>
    </div>

    <aside>
      <div class="profile-card">
        <div class="ava" th:text="${user != null ? user.iniziali : 'MP'}">MP</div>
        <div class="name" th:text="${user != null ? user.nome + ' ' + user.cognome : ''}">Marco Pollo</div>
        <div class="role" th:text="${user != null ? user.ruolo : ''}">Foodie · Livello 4</div>
        <a th:href="@{/profilo}"><button class="btn-secondary btn-block" type="button">Vai al profilo</button></a>
      </div>

      <div class="list-card">
        <div class="t">Le tue ultime recensioni</div>
        <div class="mini-reviews">

          <div class="mini-review" th:each="r : ${ultimeRecensioni}">
            <div class="exp" th:text="${r.esperienza != null ? r.esperienza.titolo : r.titolo}">Titolo Esperienza</div>
            <div class="meta">
              <span class="stars" th:text="${#strings.repeat('★', r.voto)}">★★★★★</span>
              <span class="date" th:text="${r.dataCreazione}">Mese Anno</span>
            </div>
          </div>
          <div class="mini-review" th:if="${ultimeRecensioni == null or #lists.isEmpty(ultimeRecensioni)}">
            <div class="exp">Nessuna recensione ancora</div>
          </div>

        </div>
      </div>
    </aside>
  </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
