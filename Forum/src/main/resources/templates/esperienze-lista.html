<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esperienze · Pugliamare Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/CSS/layout.css}">
  <style>
    body { margin: 0; background: #F5EFE2; font-family: 'Mulish', sans-serif; color: #15323B; }
    a { color: inherit; text-decoration: none; }
    a:hover { color: #0C4A57; }
    ::placeholder { color: #7C8C92; }

    .site-header { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #E6DCCB; }
    .site-header .inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 24px; padding: 14px 32px; }
    .logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo .icon { width: 38px; height: 38px; border-radius: 10px; background: #0C4A57; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 18px; }
    .logo .name { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px; line-height: 1.1; }
    .logo .tagline { font-size: 10px; letter-spacing: 0.06em; color: #7C8C92; font-weight: 600; }
    .site-nav { display: flex; align-items: center; gap: 22px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 14px; margin-left: auto; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: #CE6F3D; color: #fff; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 13px; flex-shrink: 0; }

    .page-head { max-width: 1280px; margin: 0 auto; padding: 36px 32px 0; }
    .eyebrow { font-size: 11px; letter-spacing: 0.08em; color: #CE6F3D; font-weight: 700; font-family: 'Outfit', sans-serif; }
    .page-head h1 { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 32px; margin: 6px 0 4px; }
    .page-head p { margin: 0 0 24px; color: #5F7882; font-size: 15px; }

    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .chip { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; padding: 10px 20px; border-radius: 999px; background: #fff; color: #15323B; box-shadow: 0 1px 3px rgba(21, 50, 59, 0.10); transition: background 0.15s, color 0.15s; }
    .chip.active { background: #0C4A57; color: #fff; box-shadow: none; }

    .grid-wrap { max-width: 1280px; margin: 0 auto; padding: 28px 32px 80px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

    .exp-card { background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #E6DCCB; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(21, 50, 59, 0.04); }
    .exp-media { position: relative; height: 170px; background: repeating-linear-gradient(135deg, #DCEFF1, #DCEFF1 10px, #EAF5F6 10px, #EAF5F6 20px); display: flex; align-items: center; justify-content: center; }
    .exp-media .placeholder { font-family: monospace; font-size: 11px; color: rgba(21, 50, 59, 0.55); background: rgba(255, 255, 255, 0.55); padding: 4px 9px; border-radius: 6px; }
    .exp-badge { position: absolute; top: 10px; left: 10px; background: #1B8DA3; color: #fff; font-size: 11px; font-weight: 700; font-family: 'Outfit', sans-serif; padding: 4px 10px; border-radius: 999px; }
    .exp-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .exp-title { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px; line-height: 1.3; }
    .exp-desc { margin: 0; font-size: 13.5px; color: #5F7882; line-height: 1.5; flex: 1; }
    .exp-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; padding-top: 10px; border-top: 1px solid #EFE9DC; }
    .exp-price { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14.5px; color: #0C4A57; }

    .no-results { text-align: center; padding: 60px 0; color: #7C8C92; font-size: 15px; }
  </style>
</head>
<body>

<div style="min-height:100vh;">

  <!-- ── Header (fragment condiviso) ──────────────────── -->
  <header th:replace="~{fragments/layout :: header('esperienze')}"></header>

  <!-- ── Intestazione pagina ─────────────────────────── -->
  <div class="page-head">
    <div class="eyebrow">ESPERIENZE</div>
    <h1>Scopri le esperienze in Puglia</h1>
    <p>Selezionate e recensite dalla community Pugliamare.</p>

    <!-- Filtri per categoria: link a /esperienze?categoriaId=... -->
    <div class="chips">
      <a class="chip" th:href="@{/esperienze}"
         th:classappend="${categoriaAttiva == null} ? 'active'">Tutte</a>
      <a class="chip" th:each="cat : ${categorie}"
         th:href="@{/esperienze(categoriaId=${cat.id})}"
         th:classappend="${categoriaAttiva != null and categoriaAttiva == cat.id} ? 'active'"
         th:text="${cat.nome}">Al mare</a>
    </div>
  </div>

  <!-- ── Griglia esperienze ──────────────────────────── -->
  <div class="grid-wrap">
    <div class="grid">
      <a class="exp-card" th:each="exp : ${esperienze}"
         th:href="@{/esperienze/{id}/discussioni(id=${exp.id})}">
        <div class="exp-media">
          <span class="placeholder" th:text="'foto: ' + ${exp.titolo}">foto: Tour in barca</span>
          <span class="exp-badge" th:if="${exp.categoria != null}" th:text="${exp.categoria.nome}">Al mare</span>
        </div>
        <div class="exp-body">
          <div class="exp-title" th:text="${exp.titolo}">Tour in barca nelle Grotte di Polignano</div>
          <p class="exp-desc" th:text="${exp.descrizione}">Le grotte al tramonto e un aperitivo in barca lungo la costa.</p>
          <div class="exp-foot">
            <span class="exp-price" th:text="'da €' + ${#numbers.formatDecimal(exp.prezzo, 1, 0)}">da €25</span>
          </div>
        </div>
      </a>
    </div>

    <div class="no-results" th:if="${#lists.isEmpty(esperienze)}">
      Nessuna esperienza trovata in questa categoria.
    </div>
  </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
