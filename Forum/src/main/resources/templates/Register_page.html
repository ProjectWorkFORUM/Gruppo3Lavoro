<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  PUGLIAMARE FORUM · REGISTRAZIONE
  Pagina standalone, pronta per Thymeleaf + Spring Boot.

  Per integrarla in Thymeleaf:
   2. Aggiungi il namespace:  <html lang="it" xmlns:th="http://www.thymeleaf.org">
   3. Sul <form>:  th:action="@{/register}" th:object="${userForm}" method="post"
   4. Sui campi usa th:field, es:
        <input type="text" th:field="*{nome}" ...>
      e per gli errori di validazione:
        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
   5. CSRF: con Spring Security il token è iniettato in automatico;
      altrimenti aggiungi dentro il form:
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
   6. I name attuali (nome, cognome, email, password, confirmPassword)
      corrispondono ai campi tipici di un DTO di registrazione.
  ════════════════════════════════════════════════════════════════
-->
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset=utf-8>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrati · Pugliamare Forum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" th:href="@{/CSS/register.css}">

</head>
<body>

<div class="auth">
  <!-- Visual side -->
  <div class="auth-visual">
    <a class="brand" href="/">
      <div class="brand-icon">P</div>
      <div class="brand-name">Pugliamare <span>Forum</span></div>
    </a>
    <div class="visual-copy">
      <h2>Entra a far parte della community.</h2>
      <div class="perks">
        <div class="perk">Pubblica e leggi recensioni autentiche</div>
        <div class="perk">Salva i posti del cuore</div>
        <div class="perk">Segui i contributori local</div>
      </div>
    </div>
  </div>

  <!-- Form side -->
  <div class="auth-form-wrap">
    <!-- th:action="@{/register}" th:object="${userForm}" method="post" -->
    <form class="auth-form" action="/register" method="post"  th:action="@{/registrazione}" th:object="${utenti}" >

      <h1>Crea il tuo account</h1>
      <p class="lead">È gratis e ci vuole meno di un minuto.</p>

      <div class="alert" th:if="${#fields.hasGlobalErrors()}"
           th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

      <div class="grid-2">
        <div class="field">
          <label for="nome">Nome</label>
          <input type="text" id="nome" th:field="*{nome}" placeholder="Marco" autocomplete="given-name" required>
          <span class="err" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>
        <div class="field">
          <label for="cognome">Cognome</label>
          <input type="text" id="cognome" th:field="*{cognome}" placeholder="Pollo" autocomplete="family-name" required>
          <span class="err" th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}"></span>
        </div>
      </div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" th:field="*{username}" placeholder="Il tuo username" autocomplete="username" required>
        <span class="err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" placeholder="nome@email.it" autocomplete="email" required>
        <span class="err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
      </div>

      <div class="field">
        <label for="dataNascita">Data di nascita</label>
        <input type="date" id="dataNascita" th:field="*{dataNascita}" required>
        <span class="err" th:if="${#fields.hasErrors('dataNascita')}" th:errors="*{dataNascita}"></span>
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" th:field="*{password}" placeholder="••••••••" autocomplete="new-password" required>
          <span class="err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>
        <div class="field">
          <label for="confirmPassword">Ripeti password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" autocomplete="new-password" required>
        </div>
      </div>

      <div class="terms">
        <input type="checkbox" id="accept" name="accettaTermini" required>
        <label for="accept">Accetto i <a href="/termini">Termini di servizio</a> e la <a href="/privacy">Privacy Policy</a> di Pugliamare.</label>
      </div>

      <!-- CSRF (Spring Security): decommentare in Thymeleaf
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      -->

      <button type="submit" class="btn-submit">Registrati</button>

      <div class="switch">
        Sei già registrato? <a href="/login">Fai il login</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
