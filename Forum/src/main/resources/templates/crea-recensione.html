<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scrivi una recensione · Pugliamare Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Mulish', -apple-system, sans-serif;
      background: #F5EFE2;
      color: #15323B;
    }
    ::selection { background: #CE6F3D; color: #fff; }
    @keyframes pmFade { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    /* ── Header ───────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(250, 247, 238, .9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #EADFCC;
    }
    .site-header .inner {
      max-width: 1340px; margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
      padding: 12px 24px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo .name { font-family: 'Outfit'; font-weight: 800; font-size: 20px; color: #0C4A57; line-height: 1.05; }
    .logo .tagline { font-size: 10px; letter-spacing: .2em; color: #CE6F3D; font-weight: 800; }
    .site-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .site-nav a {
      font-size: 15px; padding: 8px 13px; border-radius: 8px;
      color: #5F7882; font-weight: 600; text-decoration: none;
    }
    .site-nav a:hover { background: #F1ECE0; }
    .avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: linear-gradient(135deg, #0C4A57, #1B8DA3);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-family: 'Outfit';
      text-decoration: none;
    }

    /* ── Contenuto ────────────────────────── */
    .page { max-width: 880px; margin: 0 auto; padding: 36px 40px 96px; animation: pmFade .35s ease both; }
    .eyebrow { color: #CE6F3D; font-weight: 800; letter-spacing: .14em; font-size: 12.5px; margin-bottom: 7px; }
    h1 { font-family: 'Outfit'; font-weight: 800; font-size: 34px; color: #0C4A57; margin: 0 0 26px; }

    /* ── Form ─────────────────────────────── */
    .card {
      background: #fff; border: 1px solid #EDE3D2; border-radius: 20px;
      padding: 30px 32px; box-shadow: 0 6px 22px rgba(7, 50, 61, .07);
    }
    .field-label { display: block; font-weight: 700; font-size: 14px; color: #15323B; margin-bottom: 8px; }
    .field { margin-bottom: 22px; }
    .field input[type="text"],
    .field select,
    .field textarea {
      width: 100%; border: 1.5px solid #E6DCCB; border-radius: 13px;
      padding: 14px 16px; font-size: 15px; color: #15323B; background: #FBF7EF;
      font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: #1B8DA3;
      box-shadow: 0 0 0 3px rgba(27, 141, 163, .14);
    }
    .field textarea { min-height: 140px; resize: vertical; }

    /* ── Stelle ───────────────────────────── */
    .rating { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .stars { display: flex; gap: 6px; }
    .star {
      font-size: 42px; line-height: 1; cursor: pointer; user-select: none;
      color: #D8D0C0;
      transition: color .12s ease, transform .12s ease;
    }
    .star:hover { transform: scale(1.15); }
    .star.active { color: #E7A736; }
    .rating-label { color: #5F7882; font-weight: 700; font-size: 15px; }

    /* ── Upload foto ──────────────────────── */
    .dropzone {
      position: relative; border: 2px dashed #D2C4A8; border-radius: 14px;
      padding: 34px; text-align: center; color: #7C8C92;
      margin-bottom: 26px; cursor: pointer; background: #FBF7EF;
      transition: border-color .15s, background .15s;
    }
    .dropzone:hover { border-color: #1B8DA3; }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone .icon { font-size: 22px; margin-bottom: 8px; }
    .dropzone .title { font-weight: 700; color: #0C4A57; }
    .dropzone .hint { font-size: 12.5px; margin-top: 4px; }
    .dropzone .filenames { margin-top: 10px; font-size: 12.5px; color: #176B7E; font-weight: 700; }

    /* ── Azioni ───────────────────────────── */
    .actions { display: flex; justify-content: flex-end; gap: 12px; }
    .btn-secondary {
      border: 1.5px solid #E6DCCB; background: #fff; color: #5F7882;
      font-weight: 700; font-size: 15px; padding: 13px 24px;
      border-radius: 12px; cursor: pointer; font-family: inherit;
    }
    .btn-secondary:hover { background: #F8F3E9; }
    .btn-primary {
      border: none; background: #CE6F3D; color: #fff;
      font-weight: 700; font-size: 15px; padding: 13px 28px;
      border-radius: 12px; cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 16px rgba(206, 111, 61, .28);
      transition: filter .15s;
    }
    .btn-primary:hover { filter: brightness(.94); }
  </style>
</head>
<body>

<div style="min-height:100vh;">

  <!-- ── Header ──────────────────────────────────────── -->
  <header class="site-header">
    <div class="inner">
      <a class="logo" th:href="@{/home}">
        <div>
          <div class="name">Pugliamare</div>
          <div class="tagline">FORUM · COMMUNITY</div>
        </div>
      </a>
      <nav class="site-nav">
        <a th:href="@{/home}">Home</a>
        <a th:href="@{/dashboard}">Dashboard</a>
      </nav>

      <a class="avatar" th:href="@{/profilo}" title="Il tuo profilo">MP</a>
    </div>
  </header>

  <!-- ── Contenuto ───────────────────────────────────── -->
  <div class="page">
    <div class="eyebrow">CONDIVIDI CON LA COMMUNITY</div>
    <h1>Scrivi una recensione</h1>

    <!-- TODO: collegare al controller, es. th:action="@{/recensioni/crea}" th:object="${recensioneForm}" -->
    <form class="card" method="post" enctype="multipart/form-data">

      <!-- Esperienza -->
      <label class="field-label" for="esperienza">Esperienza</label>
      <div class="field">
        <select id="esperienza" name="esperienzaId" required>
          <option value="" disabled selected>Seleziona un'esperienza…</option>
          <option th:each="exp : ${esperienze}" th:value="${exp.id}" th:text="${exp.titolo}">Tour in barca nelle Grotte di Polignano</option>
        </select>
      </div>

      <!-- Titolo -->
      <label class="field-label" for="titolo">Titolo</label>
      <div class="field">
        <input type="text" id="titolo" name="titolo"
               placeholder="Riassumi la tua esperienza in una frase" required>
      </div>

      <!-- Valutazione -->
      <label class="field-label">Valutazione</label>
      <div class="rating">
        <div class="stars" id="stars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <span class="rating-label" id="ratingLabel">Tocca le stelle per votare</span>
        <input type="hidden" name="voto" id="voto" value="0">
      </div>

      <!-- Descrizione -->
      <label class="field-label" for="descrizione">Descrizione</label>
      <div class="field">
        <textarea id="descrizione" name="descrizione"
                  placeholder="Racconta com'è andata: cosa ti è piaciuto, consigli per gli altri viaggiatori…"
                  required></textarea>
      </div>

      <!-- Foto -->
      <label class="field-label">Foto</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" multiple>
        <div class="icon">⬆</div>
        <div class="title">Trascina le foto qui o clicca per caricare</div>
        <div class="hint">JPG o PNG · fino a 8 immagini</div>
        <div class="filenames" id="filenames"></div>
      </div>

      <!-- Azioni -->
      <div class="actions">
        <!-- TODO: azione annulla -->
        <button type="button" class="btn-secondary">Annulla</button>
        <button type="submit" class="btn-primary">Pubblica recensione</button>
      </div>

    </form>
  </div>

</div>

<script>
  // ── Stelle: hover, click e label ─────────────────────
  const labels = ['Tocca le stelle per votare', 'Pessimo', 'Scarso', 'Nella media', 'Molto buono', 'Eccellente'];
  const stars = document.querySelectorAll('#stars .star');
  const votoInput = document.getElementById('voto');
  const ratingLabel = document.getElementById('ratingLabel');
  let rating = 0;

  function paint(value) {
    stars.forEach(s => s.classList.toggle('active', s.dataset.value <= value));
    ratingLabel.textContent = labels[value] || labels[0];
  }

  stars.forEach(star => {
    star.addEventListener('mouseenter', () => paint(star.dataset.value));
    star.addEventListener('click', () => {
      rating = Number(star.dataset.value);
      votoInput.value = rating;
      paint(rating);
    });
  });
  document.getElementById('stars').addEventListener('mouseleave', () => paint(rating));

  document.getElementById('foto').addEventListener('change', e => {
    const files = Array.from(e.target.files || []);
    document.getElementById('filenames').textContent = files.map(f => f.name).join(', ');
  });
</script>

</body>
</html>
