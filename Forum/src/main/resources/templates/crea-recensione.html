<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scrivi una recensione · Pugliamare Forum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/crea-recensione.css" th:href="@{/Css/crea-recensione.css}">
  <link rel="stylesheet" th:href="@{/Css/layout.css}">
</head>
<body>

<div style="min-height:100vh;">

  <!-- ── Header (fragment condiviso) ──────────────────── -->
  <header th:replace="~{fragments/layout :: header('')}"></header>

  <!-- ── Contenuto ───────────────────────────────────── -->
  <div class="page">
    <div class="eyebrow">CONDIVIDI CON LA COMMUNITY</div>
    <h1>Scrivi una recensione</h1>

    <!-- L'action viene impostata dal JavaScript al submit, in base all'esperienza scelta nella select -->
    <form class="card" id="creaRecensioneForm" method="post" enctype="multipart/form-data" action="#" th:object="${recensioni}" >

      <!-- Esperienza -->
      <label class="field-label" for="esperienza">Esperienza</label>
      <div class="field">
        <select id="esperienza" name="esperienzaId" required>
          <option value="" disabled th:selected="${esperienza == null}" selected>Seleziona un'esperienza…</option>
          <option th:each="exp : ${esperienze}" th:value="${exp.id}" th:text="${exp.titolo}"
                  th:selected="${esperienza != null and exp.id == esperienza.id}">Tour in barca nelle Grotte di Polignano</option>
        </select>
      </div>

      <!-- Titolo -->
      <label class="field-label" for="titolo">Titolo</label>
      <div class="field">
        <input type="text" id="titolo" th:field="*{titolo}"
               placeholder="Riassumi la tua esperienza in una frase" required>
        <span class="field-error" th:if="${#fields.hasErrors('titolo')}" th:errors="*{titolo}"></span>
      </div>

      <!-- Valutazione -->
      <label class="field-label">Valutazione</label>
      <div class="rating">
        <div class="stars" id="stars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <span class="rating-label" id="ratingLabel">Tocca le stelle per votare</span>
        <input type="hidden" name="voto" id="voto" value="0" th:field="*{voto}">
      </div>

      <!-- Descrizione -->
      <label class="field-label" for="descrizione">Descrizione</label>
      <div class="field">
        <textarea id="descrizione" th:field="*{testo}"
                  placeholder="Racconta com'è andata: cosa ti è piaciuto, consigli per gli altri viaggiatori…"
                  required></textarea>
        <span class="field-error" th:if="${#fields.hasErrors('testo')}" th:errors="*{testo}"></span>
      </div>

      <!-- Foto -->
      <label class="field-label">Foto</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="foto" name="foto" accept="image/jpeg,image/png" multiple>
        <div class="icon">⬆</div>
        <div class="title">Trascina le foto qui o clicca per caricare</div>
        <div class="hint">JPG o PNG · fino a 8 immagini</div>
        <div class="filenames" id="filenames"></div>
      </div>

      <!-- Azioni -->
      <div class="actions">
        <!-- TODO: azione annulla -->
        <button type="button" class="btn-secondary">Annulla</button>
        <button type="submit" class="btn-primary" >Pubblica recensione</button>
      </div>

    </form>
  </div>

</div>

<script>
  // ── Stelle: hover, click e label ─────────────────────
  const labels = ['Tocca le stelle per votare', 'Pessimo', 'Scarso', 'Nella media', 'Molto buono', 'Eccellente'];
  const stars = document.querySelectorAll('#stars .star');
  const votoInput = document.getElementById('voto');
  const ratingLabel = document.getElementById('ratingLabel');
  let rating = 0;

  function paint(value) {
    stars.forEach(s => s.classList.toggle('active', s.dataset.value <= value));
    ratingLabel.textContent = labels[value] || labels[0];
  }

  stars.forEach(star => {
    star.addEventListener('mouseenter', () => paint(star.dataset.value));
    star.addEventListener('click', () => {
      rating = Number(star.dataset.value);
      votoInput.value = rating;
      paint(rating);
    });
  });
  document.getElementById('stars').addEventListener('mouseleave', () => paint(rating));

  document.getElementById('foto').addEventListener('change', e => {
    const files = Array.from(e.target.files || []);
    document.getElementById('filenames').textContent = files.map(f => f.name).join(', ');
  });

  // Il controller è mappato su /esperienze/{esperienzaId}/recensioni: costruiamo
  // l'action dinamicamente in base all'esperienza scelta nella select.
  document.getElementById('creaRecensioneForm').addEventListener('submit', function () {
    const esperienzaId = document.getElementById('esperienza').value;
    this.action = '/esperienze/' + esperienzaId + '/recensioni';
  });
</script>

<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
